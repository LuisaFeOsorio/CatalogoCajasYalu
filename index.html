    }

    .container {

      margin: 0 auto;
      padding: 1rem;
    }

    /* ===== LOGO YALU ===== */
    .header {

      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 1.5rem 0 1rem 0;
    }

    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 4.5rem;
      font-weight: 800;
      color: #B3416C;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 0.2rem;
    }

    .logo-sub {
      font-size: 0.8rem;
      font-weight: 400;
      color: #0e0e0e;
      opacity: 0.7;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .info-header {
      text-align: center;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .info-header i {
      color: #B3416C;
      margin: 0 4px;
    }

    /* ===== PESTAÑAS ===== */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 2rem 0 2rem 0;
      border-bottom: 1px solid #F3E0E8;
      padding-bottom: 0.8rem;
    }

    .tab {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      color: #999;
      cursor: pointer;
      padding: 0.5rem 0;
      position: relative;
      transition: all 0.2s;
    }

    .tab.active {
      color: #B3416C;
      font-weight: 600;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -0.9rem;
      left: 0;
      right: 0;
      height: 3px;
      background: #B3416C;
      border-radius: 2px;
    }

    /* ===== GRID DE PRODUCTOS ===== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
      margin: 1.5rem 0 3rem 0;
    }

    @media (min-width: 600px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 900px) {
      .product-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Tarjeta de producto */
    .product-card {
      background: white;
      border-radius: 16px;
      padding: 0.8rem 0.6rem 0.8rem 0.6rem;
      display: flex;
      flex-direction: column;
    }
    /* Estilo para separador entre con/sin tapa */
    .price-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(179, 65, 108, 0.3), transparent);
      margin: 0.8rem 0;
    }
    .product-image {
      width: 100%;
      aspect-ratio: 1/1;
      background: #F9EFF7;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #B3416C;
      margin-bottom: 0.6rem;
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-indicator {
      position: absolute;
      bottom: 4px;
      right: 6px;
      background: rgba(255,255,255,0.9);
      color: #B3416C;
      font-size: 0.55rem;
      padding: 2px 5px;
      border-radius: 20px;
      border: 1px solid #F9EFF7;
    }

    .product-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      color: #2D2D2D;
      line-height: 1.3;
    }

    .product-price {
      font-size: 1rem;
      font-weight: 600;
      color: #B3416C;
      margin: 0.1rem 0 0.5rem 0;
      display: flex;
      align-items: baseline;
      gap: 3px;
    }

    .product-price small {
      font-size: 0.65rem;
      font-weight: 400;
      color: #B3416C;
      opacity: 0.7;
    }

    /* Botón Ver más - MAGENTA OSCURO */
    .btn-ver-mas {
      background: #B3416C;
      border: none;
      color: white;
      padding: 0.5rem 0.3rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      min-height: 36px;
      margin-top: auto;
    }

    .btn-ver-mas i {
      font-size: 0.75rem;
      color: white;
      opacity: 0.9;
    }

    .btn-ver-mas:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(3px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal:target {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 500px;
      border-radius: 28px;
      padding: 1.8rem 1.2rem;
      box-shadow: 0 10px 30px rgba(179, 65, 108, 0.08);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-cerrar {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.6rem;
      color: #B3416C;
      text-decoration: none;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      z-index: 10;
    }

    .modal-gallery {

      flex-direction: column;
      align-items: center;
      margin-bottom: 1.2rem;
    }

      max-width: 280px;

      background: #F9EFF7;
      border-radius: 20px;
      overflow: hidden;
      margin: 0 auto 0.8rem auto;
    }

      height: 100%;
      object-fit: cover;
    }

    .modal-nav-arrows {

      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 5px 0;
    }

    .modal-nav-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #F9EFF7;
      border: 1px solid #B3416C;
      color: #B3416C;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .modal-nav-arrow:hover {
      background: #B3416C;
      color: white;
    }

    .modal-nav-arrow.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .modal-counter {
      font-size: 0.8rem;
      color: #B3416C;
      min-width: 50px;
      text-align: center;
    }

    .modal-titulo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #B3416C;
      margin-bottom: 0.3rem;
      text-align: center;

      padding: 0.8rem;

    .product-tab {
      display: none;
    }

    .product-tab.active {
      display: block;

  function calcularPreciosPorCantidad(precioStr) {
    const precioNum = parseInt(precioStr.replace(/[^0-9]/g, ''));
    if (isNaN(precioNum)) return { precio6: '$0', precio24: '$0' };

    const precioBase = Math.round(precioNum / 100) * 100;
    const precio6 = precioBase;
    const precio24 = Math.round(precioBase * 0.9 / 100) * 100;

    return {
      precio6: `$${precio6.toLocaleString('es-ES')}`,
      precio24: `$${precio24.toLocaleString('es-ES')}`
    };
  }

        tabs.forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.product-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    cargarProductos();
  });

  function cargarProductos() {
    const contenedores = {
      'arreglos': document.getElementById('productos-arreglos'),
      'joyeria': document.getElementById('productos-joyeria'),
      'empaques': document.getElementById('productos-empaques')
    };

    Object.values(contenedores).forEach(c => { if (c) c.innerHTML = ''; });

    productos.forEach(producto => {
      const cardHTML = crearTarjetaProducto(producto);
      if (contenedores[producto.categoria]) {
        contenedores[producto.categoria].innerHTML += cardHTML;
      }
    });

    generarModales();
  }

  function crearTarjetaProducto(producto) {
    let precioMinimo = Infinity;
    if (producto.variantes && producto.variantes.length > 0) {
      producto.variantes.forEach(v => {
        const precioNum = parseInt(v.precio.replace(/[^0-9]/g, ''));
        if (!isNaN(precioNum) && precioNum < precioMinimo) {
          precioMinimo = precioNum;
        }
      });
    }

    const precioFormateado = precioMinimo !== Infinity ? `$${precioMinimo.toLocaleString('es-ES')}` : 'Consultar';
    const totalImagenes = producto.imagenes?.length || 1;

    return `
        <div class="product-card">
          <div class="product-image">
            <img src="${producto.imagen}" alt="${producto.nombre}" onerror="this.src='https://via.placeholder.com/400x400?text=YALU'">
            <span class="image-indicator">${totalImagenes} <i class="fas fa-camera"></i></span>
          </div>
          <div class="product-title">${producto.nombre}</div>
          <div class="product-price">
            <small>desde</small> ${precioFormateado}
          </div>
          <a href="#modal-${producto.id}" class="btn-ver-mas">
            <i class="fas fa-eye"></i> Ver más
          </a>
        </div>
      `;
  }

  function generarModales() {
    const container = document.getElementById('modales-container');
    container.innerHTML = '';

    productos.forEach(producto => {
      const modalHTML = crearModalProducto(producto);
      container.innerHTML += modalHTML;
    });

    inicializarModales();
  }

  function crearModalProducto(producto) {
    const imagenes = producto.imagenes || [producto.imagen];

    // Verificar si el producto tiene opción con/sin tapa
    const tieneTapas = producto.esConTapas === true;

    // Separar variantes por tipo
    const variantesConTapa = producto.variantes?.filter(v => v.tipo === "con tapa") || [];
    const variantesSinTapa = producto.variantes?.filter(v => v.tipo === "sin tapa") || [];

    // Función para generar tabla de precios
    function generarTablaPrecios(variantes, titulo, icono) {
      if (!variantes.length) return '';

      let html = `
      <div style="margin-bottom: 1rem;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-left: 4px;">
          <i class="${icono}" style="color: #B3416C; font-size: 0.9rem;"></i>
          <span style="font-weight: 600; font-size: 0.8rem; color: #B3416C; letter-spacing: 0.5px;">${titulo}</span>
        </div>
        <div class="price-table" style="margin-bottom: 0;">
          <div class="price-header">
            <div>Tamaño</div>
            <div class="price-value">6+ und</div>
            <div class="price-value">24+ und</div>
          </div>
    `;

      variantes.forEach(variante => {
        if (variante.tamaño && variante.precio) {
          const precios = calcularPreciosPorCantidad(variante.precio);
          html += `
          <div class="price-row">
            <div class="price-size">${variante.tamaño}</div>
            <div class="price-value">${precios.precio6}</div>
            <div class="price-value">${precios.precio24}</div>
          </div>
        `;
        }
      });

      html += `</div></div>`;
      return html;
    }

    // Generar HTML de precios
    let preciosHTML = '';

    if (tieneTapas && variantesConTapa.length > 0 && variantesSinTapa.length > 0) {
      // Mostrar secciones separadas
      preciosHTML += generarTablaPrecios(variantesConTapa, "CON TAPA", "fas fa-box");
      preciosHTML += `<div style="height: 1px; background: rgba(179, 65, 108, 0.15); margin: 0.8rem 0;"></div>`;
      preciosHTML += generarTablaPrecios(variantesSinTapa, "SIN TAPA", "far fa-square");
    } else if (producto.variantes && producto.variantes.length > 0) {
      // Mostrar tabla normal (sin separación)
      preciosHTML += `
      <div class="price-table">
        <div class="price-header">
          <div>Tamaño</div>
          <div class="price-value">6+ und</div>
          <div class="price-value">24+ und</div>
        </div>
    `;

      producto.variantes.forEach(variante => {
        if (variante.tamaño && variante.precio) {
          const precios = calcularPreciosPorCantidad(variante.precio);
          preciosHTML += `
          <div class="price-row">
            <div class="price-size">${variante.tamaño}</div>
            <div class="price-value">${precios.precio6}</div>
            <div class="price-value">${precios.precio24}</div>
          </div>
        `;
        }
      });

      preciosHTML += `</div>`;
    }

    return `
    <div class="modal" id="modal-${producto.id}">
      <div class="modal-content">
        <a href="#" class="modal-cerrar"><i class="fas fa-times"></i></a>

        <div class="modal-gallery" id="gallery-${producto.id}">
          <div class="modal-imagen-principal">
            <img id="modal-img-${producto.id}" src="${imagenes[0]}" alt="${producto.nombre}" onerror="this.src='https://via.placeholder.com/400x400?text=YALU'">
          </div>

          <div class="modal-nav-arrows">
            <button class="modal-nav-arrow prev" id="modal-prev-${producto.id}" ${imagenes.length <= 1 ? 'disabled' : ''}>
              <i class="fas fa-chevron-left"></i>
            </button>
            <span class="modal-counter" id="modal-counter-${producto.id}">1/${imagenes.length}</span>
            <button class="modal-nav-arrow next" id="modal-next-${producto.id}" ${imagenes.length <= 1 ? 'disabled' : ''}>
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>

        <div class="modal-titulo">${producto.nombre}</div>
        <div class="modal-descripcion">${producto.descripcion}</div>

        ${preciosHTML || '<p style="text-align:center; padding:1rem; color:#999;">Consultar precios</p>'}

        <button class="btn-cotizar" onclick="window.open('https://wa.me/573007276599?text=Hola%2C%20me%20interesa%20${encodeURIComponent(producto.nombre)}%20para%20mayorista', '_blank')">
          <i class="fab fa-whatsapp"></i> Cotizar por WhatsApp
        </button>
      </div>
    </div>
  `;
  }

  function inicializarModales() {
    productos.forEach(producto => {
      const imagenes = producto.imagenes || [producto.imagen];
      if (imagenes.length <= 1) return;

      const modalImg = document.getElementById(`modal-img-${producto.id}`);
      const prevBtn = document.getElementById(`modal-prev-${producto.id}`);
      const nextBtn = document.getElementById(`modal-next-${producto.id}`);
      const counter = document.getElementById(`modal-counter-${producto.id}`);

      let currentIndex = 0;

      function updateModalImage(index) {
        if (!modalImg) return;
        modalImg.src = imagenes[index];
        if (counter) counter.textContent = `${index + 1}/${imagenes.length}`;
        if (prevBtn) prevBtn.classList.toggle('disabled', index === 0);
        if (nextBtn) nextBtn.classList.toggle('disabled', index === imagenes.length - 1);
      }

      if (prevBtn) {
        prevBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (currentIndex > 0) {
            currentIndex--;
            updateModalImage(currentIndex);
          }
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (currentIndex < imagenes.length - 1) {
            currentIndex++;
            updateModalImage(currentIndex);
          }
        });
      }

      const modalLink = document.querySelector(`a[href="#modal-${producto.id}"]`);
      if (modalLink) {
        modalLink.addEventListener('click', () => {
          currentIndex = 0;
          updateModalImage(0);
        });
      }
    });
  }
</script>
</body>
</html>
